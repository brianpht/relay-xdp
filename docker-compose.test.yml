# Docker Compose integration test topology.
#
# 5 services on a bridge network with static IPs:
#   redis       (172.28.0.2)   - Redis 7 for leader election + data storage
#   backend     (172.28.0.3)   - relay-backend, HTTP port 80
#   relay-a     (172.28.0.10)  - relay-xdp, RELAY_NO_BPF=1, UDP 40000
#   relay-b     (172.28.0.11)  - relay-xdp, RELAY_NO_BPF=1, UDP 40000
#   relay-c     (172.28.0.12)  - relay-xdp, RELAY_NO_BPF=1, UDP 40000
#
# Static IPs required because platform::parse_address() expects ip:port format.
# Each relay has its own network namespace so all bind UDP 40000 without conflict.
#
# Test keypairs are deterministic (SHA-256 of seed strings). See tests/gen-test-keys.sh.
#
# Usage:
#   docker compose -f docker-compose.test.yml up --build -d
#   bash tests/compose-test.sh

services:
  redis:
    image: redis:7-alpine
    networks:
      relay-test-net:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: relay-backend/Dockerfile
    networks:
      relay-test-net:
        ipv4_address: 172.28.0.3
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTNAME: "172.28.0.2:6379"
      RELAY_DATA_FILE: "/data/test-relays.json"
      RELAY_BACKEND_PUBLIC_KEY: "uiaT926BEMSB10asfvgiCi9QkqiLLP/4vVc7sPBfQgo="
      RELAY_BACKEND_PRIVATE_KEY: "CW9sqURAaD39bCsrcYKt753Ci7y811INpzzhcvZ0taA="
      INITIAL_DELAY: "0"
      HTTP_PORT: "80"
      RUST_LOG: "info"
    volumes:
      - ./tests/fixtures/test-relays.json:/data/test-relays.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 30s

  relay-a:
    build:
      context: .
      dockerfile: relay-xdp/Dockerfile.nobpf
    networks:
      relay-test-net:
        ipv4_address: 172.28.0.10
    depends_on:
      backend:
        condition: service_healthy
    environment:
      RELAY_NO_BPF: "1"
      RELAY_NAME: "relay-a"
      RELAY_PUBLIC_ADDRESS: "172.28.0.10:40000"
      RELAY_PUBLIC_KEY: "PzdO4BakLhxG5B9REqJkcwb0DZSh4PYH3wdV8FGH8DQ="
      RELAY_PRIVATE_KEY: "H6iGJ9up0NETlGaSiyKg28L8WUD7SAqxIK1GMNYFT3g="
      RELAY_BACKEND_PUBLIC_KEY: "uiaT926BEMSB10asfvgiCi9QkqiLLP/4vVc7sPBfQgo="
      RELAY_BACKEND_URL: "http://172.28.0.3:80"
      RUST_LOG: "info"

  relay-b:
    build:
      context: .
      dockerfile: relay-xdp/Dockerfile.nobpf
    networks:
      relay-test-net:
        ipv4_address: 172.28.0.11
    depends_on:
      backend:
        condition: service_healthy
    environment:
      RELAY_NO_BPF: "1"
      RELAY_NAME: "relay-b"
      RELAY_PUBLIC_ADDRESS: "172.28.0.11:40000"
      RELAY_PUBLIC_KEY: "+H8U9M1i36CnRt09I97/XuJXoEYowLIFbjQPcZ+rkFY="
      RELAY_PRIVATE_KEY: "Lht905489TXkG3+4ME+oJIGsTn4b364CgcHhuj9vvGU="
      RELAY_BACKEND_PUBLIC_KEY: "uiaT926BEMSB10asfvgiCi9QkqiLLP/4vVc7sPBfQgo="
      RELAY_BACKEND_URL: "http://172.28.0.3:80"
      RUST_LOG: "info"

  relay-c:
    build:
      context: .
      dockerfile: relay-xdp/Dockerfile.nobpf
    networks:
      relay-test-net:
        ipv4_address: 172.28.0.12
    depends_on:
      backend:
        condition: service_healthy
    environment:
      RELAY_NO_BPF: "1"
      RELAY_NAME: "relay-c"
      RELAY_PUBLIC_ADDRESS: "172.28.0.12:40000"
      RELAY_PUBLIC_KEY: "gX0jT3+lgWASRX9Whw3m8oChi+sFQvwZUnWMIFatsWQ="
      RELAY_PRIVATE_KEY: "q0O56yUxItge0wtv5rtHmTeKzHL9R8qLJFW7uhCrK4U="
      RELAY_BACKEND_PUBLIC_KEY: "uiaT926BEMSB10asfvgiCi9QkqiLLP/4vVc7sPBfQgo="
      RELAY_BACKEND_URL: "http://172.28.0.3:80"
      RUST_LOG: "info"

networks:
  relay-test-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

