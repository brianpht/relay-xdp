# Build and publish a GitHub Release with all deployment artifacts.
#
# Artifacts produced per release:
#   relay-backend              - x86_64 Linux binary (Rust stable)
#   relay-xdp                  - x86_64 Linux binary (Rust stable)
#   relay_xdp_rust.o           - eBPF object (Rust nightly, bpfel-unknown-none)
#   relay_module-<kver>.ko     - Kernel module, one per supported kernel version
#
# Triggers:
#   - Push of a tag matching v* (e.g. v1.2.3)
#   - Manual dispatch (workflow_dispatch)
#
# On success, creates a GitHub Release tagged with the pushed tag (or the
# manually supplied version) and attaches all artifacts to it.
#
# Kernel version matrix: add entries to the matrix below when new kernel
# versions are deployed on staging/production hosts.  The runner must have
# the matching linux-headers-* package available in the Ubuntu apt mirror.
# Check available versions: apt-cache search linux-headers | grep generic

name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.2.3)"
        required: true
        type: string

# Prevent concurrent releases for the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default: restrict all permissions, then grant only what each job needs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ------------------------------------------------------------------
  # Job 1: Build relay-backend and relay-xdp userspace binaries
  # ------------------------------------------------------------------
  build-userspace:
    name: Build userspace binaries
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: userspace-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            userspace-${{ runner.os }}-

      - name: Build relay-backend
        run: cargo build --release -p relay-backend

      - name: Build relay-xdp
        run: cargo build --release -p relay-xdp

      - name: Upload relay-backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-backend
          path: target/release/relay-backend
          retention-days: 1

      - name: Upload relay-xdp artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-xdp
          path: target/release/relay-xdp
          retention-days: 1

  # ------------------------------------------------------------------
  # Job 2: Build eBPF object (relay_xdp_rust.o)
  # Requires Rust nightly + bpf-linker. relay-xdp-ebpf is NOT a
  # workspace member - it is built separately targeting bpfel-unknown-none.
  #
  # bpf-linker MUST produce .BTF and .BTF.ext sections. Without BTF,
  # aya 0.13 cannot relocate subprogram calls and fails with
  # "function not found" at load time.
  #
  # Root cause of missing BTF in CI: actions-rust-lang/setup-rust-toolchain
  # sets RUSTFLAGS="-D warnings" at the workflow level, which overrides ALL
  # config.toml rustflags (including target.bpfel-unknown-none.rustflags).
  # The build step therefore explicitly sets RUSTFLAGS with the required flags.
  #
  # NOTE: relay-xdp-ebpf/target is intentionally NOT cached. Caching
  # the target directory causes stale artifacts (built without --btf)
  # to persist across linker config changes.
  # ------------------------------------------------------------------
  build-ebpf:
    name: Build eBPF object
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install Rust nightly with rust-src
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache Cargo registry (nightly)
        # Only cache the registry/git sources, NOT the target directory.
        # Caching relay-xdp-ebpf/target causes stale builds when the
        # linker config changes (bpf-linker --btf vs default linker).
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ebpf-registry-${{ runner.os }}-${{ hashFiles('relay-xdp-ebpf/Cargo.lock') }}
          restore-keys: |
            ebpf-registry-${{ runner.os }}-

      - name: Cache bpf-linker binary
        id: cache-bpf-linker
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/bpf-linker
          key: bpf-linker-${{ runner.os }}-0.10.3

      - name: Install bpf-linker
        if: steps.cache-bpf-linker.outputs.cache-hit != 'true'
        run: cargo install bpf-linker --version 0.10.3 --locked

      - name: Build eBPF program
        working-directory: relay-xdp-ebpf
        # RUSTFLAGS must be set explicitly here because actions-rust-lang/
        # setup-rust-toolchain sets RUSTFLAGS="-D warnings" as a workflow-level
        # env var, which overrides ALL config.toml rustflags (including
        # target.bpfel-unknown-none.rustflags). Without debuginfo=2, bpf-linker
        # has no DWARF to convert to BTF. Without link-arg=--btf, bpf-linker
        # does not emit .BTF/.BTF.ext sections. Both are required for aya 0.13+
        # to load programs with subprogram calls.
        env:
          RUSTFLAGS: "-C debuginfo=2 -C link-arg=--btf"
        run: |
          cargo +nightly build \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release

      - name: Verify .BTF section present in eBPF object
        # Without .BTF sections, aya 0.13 cannot relocate subprogram calls.
        # Fail fast here rather than deploying a broken artifact.
        run: |
          OBJ=relay-xdp-ebpf/target/bpfel-unknown-none/release/relay-xdp-ebpf
          if ! readelf -S "$OBJ" | grep -q '\.BTF'; then
            echo "ERROR: .BTF section missing from eBPF object. bpf-linker --btf flag may not have taken effect."
            readelf -S "$OBJ"
            exit 1
          fi
          echo "BTF sections present:"
          readelf -S "$OBJ" | grep BTF

      - name: Upload eBPF object artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay_xdp_rust.o
          path: relay-xdp-ebpf/target/bpfel-unknown-none/release/relay-xdp-ebpf
          retention-days: 1

  # ------------------------------------------------------------------
  # Job 3: Collect all artifacts and create GitHub Release.
  # Runs after all build jobs succeed.
  #
  # NOTE: The kernel module (relay_module.c) is NOT pre-built in CI.
  # Pre-building .ko artifacts fails for AWS kernel variants because
  # the GitHub runner compiles with a different GCC version and CONFIG
  # flags than Amazon uses, producing a vermagic mismatch that causes
  # insmod to fail with EINVAL on the target EC2 host.
  #
  # Instead, relay_module.c source is uploaded to the Release and the
  # Ansible kernel-module role builds it on the target host at deploy
  # time using the running kernel's own headers. This guarantees the
  # vermagic always matches regardless of kernel variant (generic, aws,
  # or any future variant).
  # ------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - build-userspace
      - build-ebpf
    permissions:
      contents: write  # required to create releases and upload assets
      checks: write    # required for release action to annotate the workflow run
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download relay-backend
        uses: actions/download-artifact@v4
        with:
          name: relay-backend
          path: dist/

      - name: Download relay-xdp
        uses: actions/download-artifact@v4
        with:
          name: relay-xdp
          path: dist/

      - name: Download relay_xdp_rust.o
        uses: actions/download-artifact@v4
        with:
          name: relay_xdp_rust.o
          path: dist/

      - name: Copy kernel module source
        # relay_module.c is built on the target EC2 host at Ansible deploy time.
        # This avoids vermagic mismatch between CI-compiled .ko and the running
        # AWS kernel. The Ansible kernel-module role downloads this file, installs
        # linux-headers-$(uname -r), and runs make on the host.
        run: cp module/relay_module.c dist/relay_module.c

      - name: Rename eBPF object to canonical name
        run: |
          # The artifact is uploaded as "relay-xdp-ebpf" (binary name);
          # rename to relay_xdp_rust.o for clarity at deploy time.
          if [ -f dist/relay-xdp-ebpf ]; then
            mv dist/relay-xdp-ebpf dist/relay_xdp_rust.o
          fi

      - name: Mark binaries executable
        run: chmod +x dist/relay-backend dist/relay-xdp

      - name: List release artifacts
        run: ls -lh dist/

      - name: Determine if pre-release
        id: prerelease
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if echo "$TAG" | grep -qE '\-(alpha|beta|rc)(\.[0-9]+)?$'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "relay-xdp ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: dist/*

