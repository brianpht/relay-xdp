# Security audit for Rust dependencies using cargo-audit.
#
# Scans Cargo.lock against the RustSec advisory database (rustsec.org).
# Reports vulnerabilities, unmaintained crates, and unsound code.
#
# Triggers:
#   - Push to main/master
#   - Pull requests to main/master
#   - Weekly schedule (Sunday 02:00 UTC) to catch new advisories
#   - Manual dispatch
#
# Uses cargo-audit CLI directly (not rustsec/audit-check) to avoid the
# "Resource not accessible by integration" error that occurs when
# checks:write is unavailable (fork PRs, restricted repo settings).
#
# Note: this workflow runs only on the host workspace Cargo.lock.
# relay-xdp-ebpf has its own Cargo.lock and is audited in the ebpf job below.

name: Security Audit

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Cargo.lock"
      - ".github/workflows/security-audit.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "Cargo.lock"
  schedule:
    # Every Sunday at 02:00 UTC - catch advisories published between releases.
    - cron: "0 2 * * 0"
  workflow_dispatch:

# Read-only token - cargo-audit CLI does not need checks:write.
permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-latest-${{ hashFiles('.github/workflows/security-audit.yml') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || cargo install cargo-audit

      - name: Run cargo audit (workspace)
        # --deny=unsound fails on unsound code; vulnerabilities always fail by default.
        run: cargo audit --deny unsound --file Cargo.lock

  audit-ebpf:
    name: cargo audit (relay-xdp-ebpf)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-latest-${{ hashFiles('.github/workflows/security-audit.yml') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || cargo install cargo-audit

      - name: Run cargo audit (relay-xdp-ebpf)
        run: cargo audit --deny unsound --file relay-xdp-ebpf/Cargo.lock
