name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (workspace)
        run: cargo clippy --workspace --lib --bins -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  build-ebpf:
    name: Build eBPF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: relay-xdp-ebpf
      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker
      - name: Build eBPF program
        working-directory: relay-xdp-ebpf
        run: cargo +nightly build --target bpfel-unknown-none -Z build-std=core --release

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  bench:
    name: Bench (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Compile benchmarks (no-run)
        # --no-run compiles all bench targets without executing them.
        # This catches benchmark compilation regressions on every push/PR
        # without paying the cost of running criterion timing loops in CI.
        run: cargo bench --no-run -p relay-sdk

  compose-test:
    name: Compose Integration Test
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build and start services
        run: docker compose -f docker-compose.test.yml up --build -d
      - name: Run integration assertions
        run: bash tests/compose-test.sh --no-build
      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail=100
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
