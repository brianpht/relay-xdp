# Shared defaults across all environments.
# Override in group_vars/staging.yml or group_vars/production.yml.

# ---- Artifact / version ------------------------------------------------
relay_version: "v0.1.0-alpha.23"
github_repo: "brianpht/relay-xdp"
artifact_base_url: "https://github.com/{{ github_repo }}/releases/download/{{ relay_version }}"

# ---- Install paths -----------------------------------------------------
relay_bin_dir:    /usr/local/bin
relay_data_dir:   /opt/relay
relay_backup_dir: /opt/relay/backup
relay_conf_dir:   /etc/relay
relay_user:       relay
relay_group:      relay

# ---- Network -----------------------------------------------------------
relay_udp_port:    40000
relay_http_port:   8080
backend_http_port: 8090
redis_port:        6379

# ---- Kernel ------------------------------------------------------------
min_kernel_major: 6
min_kernel_minor: 5

# ---- Logging -----------------------------------------------------------
rust_log: info
rust_backtrace: 1

# ---- Timeouts / intervals ----------------------------------------------
relay_ping_interval_ms: 100
relay_update_interval_ms: 1000
relay_session_timeout_s: 60

# ---- Rolling deploy verification ---------------------------------------
relay_startup_wait_s: 5
relay_verify_retries: 3
relay_verify_delay_s: 3

