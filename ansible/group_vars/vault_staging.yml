# ansible/group_vars/vault_staging.yml
#
# This file MUST be encrypted with ansible-vault before committing.
# Plaintext vault files must NEVER be committed to the repository.
#
# First-time setup:
#   1. Generate keypairs:
#        cd ansible
#        ./scripts/gen-vault-keys.sh staging > /tmp/vault_staging_plain.yml
#   2. Copy into place:
#        cp /tmp/vault_staging_plain.yml group_vars/vault_staging.yml
#   3. Encrypt:
#        ./scripts/encrypt-vault.sh staging
#   4. Shred plaintext:
#        shred -u /tmp/vault_staging_plain.yml
#   5. Commit: git add group_vars/vault_staging.yml
#
# To edit existing vault:
#   ansible-vault edit group_vars/vault_staging.yml
#
# To view:
#   ansible-vault view group_vars/vault_staging.yml
#
# Expected plaintext structure (gen-vault-keys.sh produces this):
#
#   vault_relay_backend_public_key:  "<base64-32-bytes>"
#   vault_relay_backend_private_key: "<base64-32-bytes>"
#   vault_relay_keys:
#     relay-staging-1:
#       public_key:  "<base64-32-bytes>"
#       private_key: "<base64-32-bytes>"
#
# PLACEHOLDER - replace this entire file with ansible-vault encrypted content.
ANSIBLE_VAULT_PLACEHOLDER: this file must be encrypted with ansible-vault before use

