---
# roles/redis/tasks/main.yml
# Install and configure Redis 7 for relay-backend.

- name: Install Redis
  ansible.builtin.apt:
    name: redis-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Deploy Redis configuration
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: "0640"
  notify: restart redis

- name: Enable and start Redis
  ansible.builtin.systemd:
    name: redis-server
    enabled: true
    state: started

- name: Wait for Redis to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ redis_port }}"
    timeout: 30

